name: Sync dashboard data

on:
  schedule:
    # 02:00 UTC is 10:00 in Asia/Shanghai.
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-dashboard-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install workbook reader
        run: python -m pip install openpyxl==3.1.5

      - name: Download latest Google Sheets workbook
        run: |
          curl --fail --location --retry 3 \
            "https://docs.google.com/spreadsheets/d/1fanD4p6YWWmIvcpdgVtxlNt9ivbwOCWmQ48CIZTSNNo/export?format=xlsx" \
            --output source-dashboard-latest.xlsx

      - name: Build dashboard data
        env:
          DASHBOARD_WORKBOOK: source-dashboard-latest.xlsx
        run: python scripts/build_data.py

      - name: Commit updated data
        run: |
          if git diff --quiet -- public/data/dashboard.json; then
            echo "Dashboard data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/dashboard.json
          git commit -m "Update dashboard data"
          git push
